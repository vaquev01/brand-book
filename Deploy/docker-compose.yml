version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: Deploy/Dockerfile.dev
    env_file:
      - ../.env.local
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/brandbook_app?schema=public
    depends_on:
      - postgres
    ports:
      - "3005:3005"
    volumes:
      - ..:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brandbook_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
