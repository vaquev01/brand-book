name: CI / Deploy

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: Test, Typecheck, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Variáveis obrigatórias para o build Next.js (valores mock para CI)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-mock-ci' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'mock-ci' }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY || 'mock-ci' }}
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY || 'mock-ci' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/brandbook_app' }}

  deploy:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: build
    # Só faz deploy em push direto à main (não em PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service brand-book
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
